# Stage 3: Instruction Tuning with LoRA
# Frozen: vision encoder
# Trained: projector + LLM with LoRA

stage: "stage3"

model:
  encoder_weights_path: "/workspace/checkpoints/stage1_best.pt"
  projector_type:       "linear"
  llm_name:             "mistralai/Mistral-7B-Instruct-v0.2"
  token_dim:            512
  use_lora:             true
  lora_r:               64
  lora_alpha:           16
  lora_dropout:         0.05

data:
  metadata_path:  "/workspace/data/metadata.csv"
  local_data_dir: "/workspace/data"
  use_english:    false
  encoder:        "ctvit"

training:
  epochs:        20
  batch_size:    8
  learning_rate: 2.0e-5
  weight_decay:  0.01
  warmup_steps:  100
  max_length:    512
  log_every:     10
  eval_every:    500
  save_every:    500
  gradient_clip: 1.0
  num_workers:   4

output:
  checkpoint_dir: "/workspace/checkpoints/stage3"
  log_dir:        "/workspace/logs"
