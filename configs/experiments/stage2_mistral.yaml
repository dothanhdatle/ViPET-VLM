# Stage 2: Alignment with Mistral-7B (for Vast.ai A100)

stage: "stage2"

model:
  pet_encoder_weights_path: "/workspace/checkpoints/stage1/stage1_best_pet_encoder.pt"
  ct_encoder_weights_path:  "/workspace/checkpoints/stage1/stage1_best_ct_encoder.pt"
  projector_type:       "linear"
  llm_name:             "mistralai/Mistral-7B-Instruct-v0.2"
  token_dim:            131072
  use_lora:             false

data:
  metadata_path:  "/workspace/data/metadata.csv"
  local_data_dir: "/workspace/data"
  use_english:    false
  encoder:        "ctvit"
  qa_path: "/workspace/data/vqa_train.json"
  qa_per_patient: 2

training:
  epochs:        10
  batch_size:    8
  learning_rate: 2.0e-3
  weight_decay:  0.01
  warmup_steps:  100
  max_length:    512
  log_every:     10
  eval_every:    200
  save_every:    200
  gradient_clip: 1.0
  num_workers:   4

output:
  checkpoint_dir: "/workspace/checkpoints/stage2"
  log_dir:        "/workspace/logs"
