# Stage 2: Alignment with Mistral-7B (for Vast.ai A100)

stage: "stage2"

model:
  pet_encoder_weights_path: "/workspace/checkpoints/stage1/stage1_best_vision_encoder.pt"
  projector_type:       "linear"
  llm_name:             "mistralai/Mistral-7B-Instruct-v0.2"
  use_lora:             false

data:
  metadata_path:  "/workspace/data/metadata.csv"
  local_data_dir: "/workspace/data"
  use_english:    false
  encoder:        "ctvit"
  qa_path: "/workspace/data/vqa_full.json"
  qa_per_study: 2

training:
  seed:          42
  epochs:        5
  batch_size:    4
  learning_rate: 2.0e-3
  weight_decay:  0.01
  warmup_steps:  200
  max_length:    2048
  log_every:     10
  gradient_clip: 1.0
  num_workers:   2

output:
  checkpoint_dir: "/workspace/checkpoints/stage2"
  log_dir:        "/workspace/logs"
