# Stage 1: PET-only CT-ViT CLIP fine-tuning (for Vast.ai A100)

stage: "stage1"

model:
  type:          "ctvit_clip"
  weights_path:  "/workspace/weights/CT-CLIP_v2.pt"
  embed_dim:     512
  freeze_text:   false
  freeze_vision: false

data:
  metadata_path:  "/workspace/data/metadata.csv"
  local_data_dir: "/workspace/data"
  use_english:    false
  encoder:        "ctvit"

training:
  epochs:        5
  batch_size:    8
  learning_rate: 1.25e-6
  weight_decay:  0.01
  warmup_steps:  100
  log_every:     10
  gradient_clip: 1.0
  num_workers:   4

output:
  checkpoint_dir: "/workspace/checkpoints/stage1"
  log_dir:        "/workspace/logs"