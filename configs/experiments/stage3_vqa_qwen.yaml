# Stage 3 (VQA): LoRA fine-tuning with Qwen2.5-0.5B (for testing on T4)

stage: "stage3_vqa"

model:
  encoder_weights_path: "/content/drive/MyDrive/weights/ctvit_pretrained.pt"
  projector_type:       "linear"
  llm_name:             "Qwen/Qwen2.5-0.5B-Instruct"
  token_dim:            512
  use_lora:             true
  lora_r:               8
  lora_alpha:           16
  lora_dropout:         0.05

data:
  metadata_path:  "/content/ViPET-data/metadata_subset.csv"
  vqa_path:       "/content/ViPET-data/vqa_conversations.json"
  local_data_dir: "/content/ViPET-data"
  use_english:    false
  encoder:        "ctvit"

training:
  epochs:        2
  batch_size:    2
  learning_rate: 2.0e-5
  weight_decay:  0.01
  warmup_steps:  2
  max_length:    256
  log_every:     1
  eval_every:    5
  save_every:    999
  gradient_clip: 1.0
  num_workers:   2

output:
  checkpoint_dir: "/content/drive/MyDrive/ViPET-VLM/checkpoints/stage3_vqa_qwen"
  log_dir:        "/content/drive/MyDrive/ViPET-VLM/logs"
