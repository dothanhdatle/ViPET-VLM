# Stage 2: Alignment with Qwen2.5-0.5B (for testing on T4)

stage: "stage2"

model:
  pet_encoder_weights_path: "/content/drive/MyDrive/weights/ctvit_pretrained.pt"
  ct_encoder_weights_path:  "/content/drive/MyDrive/weights/ctvit_pretrained.pt"
  projector_type:       "linear"
  llm_name:             "Qwen/Qwen2.5-0.5B-Instruct"
  token_dim:            512
  use_lora:             false

data:
  metadata_path:  "/content/ViPET-data/metadata_subset.csv"
  local_data_dir: "/content/ViPET-data"
  use_english:    false
  encoder:        "ctvit"

training:
  epochs:        2
  batch_size:    2
  learning_rate: 2.0e-3
  weight_decay:  0.01
  warmup_steps:  2
  max_length:    256
  log_every:     1
  eval_every:    2
  save_every:    999
  gradient_clip: 1.0
  num_workers:   2

output:
  checkpoint_dir: "/content/drive/MyDrive/ViPET-VLM/checkpoints/stage2_qwen"
  log_dir:        "/content/drive/MyDrive/ViPET-VLM/logs"
